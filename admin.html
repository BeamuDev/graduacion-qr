<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Entradas Graduación</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#0f172a" />
</head>
<body>

<!-- ======== LOGIN ======== -->
<section id="vista-login" class="container" style="padding-top: 3rem;">
  <div class="card">
    <h1>Acceso administrador</h1>
    <p class="muted" style="margin-bottom:1rem;">Introduce tus credenciales para gestionar las entradas.</p>
    <form id="form-login">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button class="btn btn-block" type="submit">Entrar</button>
      <p id="login-error" class="muted" style="color:#f87171; margin-top:0.75rem;"></p>
    </form>
    <p class="muted" style="margin-top:1rem; text-align:center;">
      <a href="index.html">← Volver</a>
    </p>
  </div>
</section>

<!-- ======== PANEL ADMIN ======== -->
<section id="vista-admin" class="hidden">
  <header class="topbar">
    <h1 id="evento-titulo">Admin · Entradas</h1>
    <span><span id="user-email" class="user"></span> · <a href="#" id="btn-logout">Salir</a></span>
  </header>

  <div class="container">

    <!-- Estadísticas -->
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="num" id="stat-disponibles" style="color:#34d399;">0</div><div class="lbl">Disponibles</div></div>
      <div class="stat"><div class="num" id="stat-usadas" style="color:#f87171;">0</div><div class="lbl">Usadas</div></div>
    </div>

    <!-- Crear entradas -->
    <div class="card">
      <h2>Crear nuevas entradas</h2>
      <div class="toolbar">
        <input id="cantidad" type="number" min="1" max="500" value="10" style="margin-bottom:0;" />
        <button id="btn-crear" class="btn">Crear N entradas</button>
      </div>
      <p class="muted">Se generan códigos únicos del tipo <code>ENT-XXXXXX</code>.</p>
    </div>

    <!-- Acciones masivas -->
    <div class="card">
      <h2>Acciones</h2>
      <div class="toolbar">
        <button id="btn-pdf" class="btn btn-success">📄 Descargar PDF imprimible</button>
        <button id="btn-resetear" class="btn btn-secondary">↺ Marcar todas como NO usadas</button>
        <button id="btn-borrar-todo" class="btn btn-danger">🗑 Borrar TODAS las entradas</button>
      </div>
    </div>

    <!-- Lista -->
    <div class="card">
      <h2>Entradas (<span id="lista-count">0</span>)</h2>
      <div class="toolbar">
        <input id="filtro" type="text" placeholder="Filtrar por código..." style="margin-bottom:0;" />
      </div>
      <div id="lista" class="list"></div>
    </div>

  </div>
</section>

<!-- ======== Bibliotecas ======== -->
<script src="config.js"></script>
<!-- Firebase v10 modular vía import -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, doc, getDocs, setDoc, deleteDoc, updateDoc,
    onSnapshot, query, orderBy, writeBatch
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app  = initializeApp(window.firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const col  = collection(db, "entradas");

  // ----------- Helpers UI -----------
  const $ = (id) => document.getElementById(id);
  const show = (el) => el.classList.remove('hidden');
  const hide = (el) => el.classList.add('hidden');

  if (window.NOMBRE_EVENTO) $("evento-titulo").textContent = window.NOMBRE_EVENTO;

  // ----------- Login -----------
  $("form-login").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("login-error").textContent = "";
    try {
      await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
    } catch (err) {
      $("login-error").textContent = "Credenciales incorrectas o usuario no autorizado.";
      console.error(err);
    }
  });

  $("btn-logout").addEventListener("click", (e) => {
    e.preventDefault();
    signOut(auth);
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      hide($("vista-login"));
      show($("vista-admin"));
      $("user-email").textContent = user.email;
      iniciarListener();
    } else {
      hide($("vista-admin"));
      show($("vista-login"));
    }
  });

  // ----------- Generación de códigos -----------
  function generarCodigo() {
    // 6 caracteres alfanum sin caracteres ambiguos (0/O, 1/I/L)
    const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
    let c = "ENT-";
    for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
    return c;
  }

  // ----------- Lectura en tiempo real -----------
  let entradasCache = [];
  function iniciarListener() {
    const q = query(col, orderBy("creada", "desc"));
    onSnapshot(q, (snap) => {
      entradasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      pintarLista();
      pintarStats();
    });
  }

  function pintarStats() {
    const total = entradasCache.length;
    const usadas = entradasCache.filter(e => e.usada).length;
    $("stat-total").textContent = total;
    $("stat-usadas").textContent = usadas;
    $("stat-disponibles").textContent = total - usadas;
  }

  function pintarLista() {
    const filtro = $("filtro").value.trim().toUpperCase();
    const lista = entradasCache.filter(e => e.id.includes(filtro));
    $("lista-count").textContent = lista.length;
    $("lista").innerHTML = lista.map(e => `
      <div class="list-item">
        <span class="codigo">${e.id}</span>
        <span class="${e.usada ? 'badge badge-used' : 'badge badge-ok'}">
          ${e.usada ? 'Usada' : 'Disponible'}
        </span>
        <span style="display:flex; gap:0.25rem;">
          <button class="btn btn-secondary" data-toggle="${e.id}" style="padding:0.4rem 0.6rem; font-size:0.8rem;">
            ${e.usada ? 'Reactivar' : 'Marcar usada'}
          </button>
          <button class="btn btn-danger" data-del="${e.id}" style="padding:0.4rem 0.6rem; font-size:0.8rem;">✕</button>
        </span>
      </div>
    `).join("");

    // Listeners por botón
    $("lista").querySelectorAll("[data-toggle]").forEach(btn => {
      btn.onclick = async () => {
        const id = btn.dataset.toggle;
        const ent = entradasCache.find(e => e.id === id);
        await updateDoc(doc(col, id), {
          usada: !ent.usada,
          usadaEn: !ent.usada ? new Date().toISOString() : null
        });
      };
    });
    $("lista").querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(`¿Borrar la entrada ${btn.dataset.del}?`)) return;
        await deleteDoc(doc(col, btn.dataset.del));
      };
    });
  }

  $("filtro").addEventListener("input", pintarLista);

  // ----------- Crear N entradas -----------
  $("btn-crear").addEventListener("click", async () => {
    const n = parseInt($("cantidad").value, 10);
    if (!n || n < 1) return alert("Indica un número válido.");
    if (n > 500) return alert("Máximo 500 por lote.");

    $("btn-crear").disabled = true;
    $("btn-crear").textContent = "Creando...";
    try {
      // Evitar colisiones: comprobar contra cache + reintentar si choca
      const existentes = new Set(entradasCache.map(e => e.id));
      const batch = writeBatch(db);
      let creados = 0;
      while (creados < n) {
        const codigo = generarCodigo();
        if (existentes.has(codigo)) continue;
        existentes.add(codigo);
        batch.set(doc(col, codigo), {
          usada: false,
          usadaEn: null,
          creada: new Date().toISOString()
        });
        creados++;
      }
      await batch.commit();
    } catch (err) {
      alert("Error al crear: " + err.message);
      console.error(err);
    } finally {
      $("btn-crear").disabled = false;
      $("btn-crear").textContent = "Crear N entradas";
    }
  });

  // ----------- Borrar todo -----------
  $("btn-borrar-todo").addEventListener("click", async () => {
    if (!confirm(`¿Seguro que quieres borrar TODAS las ${entradasCache.length} entradas? Esta acción no se puede deshacer.`)) return;
    if (!confirm("Última confirmación. ¿Borrar todas las entradas?")) return;
    const batch = writeBatch(db);
    entradasCache.forEach(e => batch.delete(doc(col, e.id)));
    await batch.commit();
  });

  // ----------- Resetear (todas a no usada) -----------
  $("btn-resetear").addEventListener("click", async () => {
    if (!confirm("¿Marcar TODAS las entradas como NO usadas? Útil si has hecho una prueba.")) return;
    const batch = writeBatch(db);
    entradasCache.forEach(e => batch.update(doc(col, e.id), { usada: false, usadaEn: null }));
    await batch.commit();
  });

  // ============================================================
  //  GENERAR PDF IMPRIMIBLE CON TODAS LAS ENTRADAS
  // ============================================================
  $("btn-pdf").addEventListener("click", async () => {
    if (entradasCache.length === 0) return alert("No hay entradas para imprimir.");
    $("btn-pdf").disabled = true;
    $("btn-pdf").textContent = "Generando PDF...";

    try {
      // Cargar jsPDF y qrcode dinámicamente
      await cargarScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
      await cargarScript("https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js");

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: "mm", format: "a4" });

      const pageW = 210, pageH = 297;
      const cols = 2, rows = 5;          // 10 entradas por página
      const margin = 10;
      const cellW = (pageW - margin * 2) / cols;
      const cellH = (pageH - margin * 2) / rows;
      const qrSize = 35;                 // mm

      const evento = window.NOMBRE_EVENTO || "Graduación";

      const ordenadas = [...entradasCache].sort((a, b) => a.id.localeCompare(b.id));

      for (let i = 0; i < ordenadas.length; i++) {
        if (i > 0 && i % (cols * rows) === 0) pdf.addPage();
        const idx = i % (cols * rows);
        const c = idx % cols;
        const r = Math.floor(idx / cols);
        const x = margin + c * cellW;
        const y = margin + r * cellH;

        // Marco
        pdf.setDrawColor(180);
        pdf.setLineDashPattern([1, 1], 0);
        pdf.rect(x + 2, y + 2, cellW - 4, cellH - 4);
        pdf.setLineDashPattern([], 0);

        // QR como dataURL
        const dataURL = await generarQRDataURL(ordenadas[i].id, 256);
        const qrX = x + (cellW - qrSize) / 2;
        pdf.addImage(dataURL, "PNG", qrX, y + 6, qrSize, qrSize);

        // Texto
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(11);
        pdf.text(evento, x + cellW / 2, y + 6 + qrSize + 6, { align: "center" });
        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(9);
        pdf.text("ENTRADA · Presenta este QR en la puerta", x + cellW / 2, y + 6 + qrSize + 11, { align: "center" });
        pdf.setFont("courier", "bold");
        pdf.setFontSize(12);
        pdf.text(ordenadas[i].id, x + cellW / 2, y + 6 + qrSize + 17, { align: "center" });
      }

      pdf.save(`entradas_${(evento || 'graduacion').replace(/\s+/g,'_').toLowerCase()}.pdf`);
    } catch (err) {
      alert("Error generando PDF: " + err.message);
      console.error(err);
    } finally {
      $("btn-pdf").disabled = false;
      $("btn-pdf").textContent = "📄 Descargar PDF imprimible";
    }
  });

  // ----------- Utilidades -----------
  function cargarScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) return resolve();
      const s = document.createElement("script");
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  // Genera un PNG dataURL del QR usando qrcodejs (lib que dibuja en un div)
  function generarQRDataURL(texto, size) {
    return new Promise((resolve) => {
      const div = document.createElement("div");
      div.style.display = "none";
      document.body.appendChild(div);
      // QRCode global lo provee qrcodejs
      // eslint-disable-next-line no-new
      new QRCode(div, {
        text: texto, width: size, height: size,
        correctLevel: QRCode.CorrectLevel.M
      });
      // qrcodejs es síncrono, deja un canvas o un img
      setTimeout(() => {
        const img = div.querySelector("img");
        const canvas = div.querySelector("canvas");
        const dataURL = img ? img.src : canvas.toDataURL("image/png");
        document.body.removeChild(div);
        resolve(dataURL);
      }, 50);
    });
  }
</script>

</body>
</html>
